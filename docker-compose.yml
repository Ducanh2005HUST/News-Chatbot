
networks:
  chatbot_net:
    driver: bridge

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news_chatbot_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - FAISS_PATH=/app/faiss_data
    volumes:
      # Lưu FAISS index và metadata persistent
      - faiss_data:/app/faiss_data
      # Lưu HuggingFace model cache (nếu dùng local model sau này)
      - huggingface_cache:/root/.cache/huggingface
    networks:
      - chatbot_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news_chatbot_frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chatbot_net
    restart: unless-stopped

volumes:
  faiss_data:
  huggingface_cache:
