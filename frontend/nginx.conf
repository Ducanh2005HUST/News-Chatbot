server {
    listen 5173;

    # Docker internal DNS resolver – bắt buộc để nginx resolve hostname lazy
    # (tránh lỗi 'host not found' khi backend chưa ready lúc startup)
    resolver 127.0.0.11 valid=10s;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container
    location /chat {
        proxy_pass http://backend:8000/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /stats {
        proxy_pass http://backend:8000/stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # STT endpoint – nhận audio từ frontend, chuyển lên backend local Whisper
    location /stt {
        proxy_pass http://backend:8000/stt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Audio file có thể nặng đến vài MB, tăng timeout
        proxy_read_timeout 60s;
        client_max_body_size 25M;
    }
}
